name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: pyinstaller build_windows.spec --noconfirm

      - name: Create ZIP archive
        run: |
          cd dist
          Compress-Archive -Path "Live AreaTranslator" -DestinationPath "LiveAreaTranslator-Windows-${{ github.ref_name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiveAreaTranslator-Windows
          path: dist/LiveAreaTranslator-Windows-*.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LiveAreaTranslator-Windows-*.zip
          generate_release_notes: true
